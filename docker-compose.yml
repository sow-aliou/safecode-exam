version: '3.8'

services:
  backend:
    build: ./server
    container_name: safecode_backend
    volumes:
      - ./server:/server
      - /server/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    restart: always

  app:
    build: .
    container_name: safecode_app
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
      - /tmp/.X11-unix:/tmp/.X11-unix
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - DISPLAY=$DISPLAY
      - XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR
    network_mode: host
    privileged: true
    ipc: host
