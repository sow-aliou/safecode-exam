services:
  # ===== SERVICE 1: Backend Node.js/Express + SQLite =====
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: safecode_backend
    volumes:
      # Persistance de la base de données uniquement (flag :z requis sur Fedora avec SELinux/Podman)
      - ./server/server_database.db:/server/server_database.db:z
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

  # ===== SERVICE 2: Frontend Vite (React) =====
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safecode_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3000
    restart: unless-stopped
